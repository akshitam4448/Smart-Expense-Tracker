{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white;">
                    <h4 class="mb-0" style="color: white;">
                        <i class="fas fa-edit"></i> Edit Income
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('edit_income', income_id=income.id) }}">
                        <!-- Source -->
                        <div class="mb-3">
                            <label for="source" class="form-label">
                                <i class="fas fa-building"></i> Income Source
                            </label>
                            <input type="text" class="form-control" id="source" name="source"
                                   value="{{ income.source }}" required>
                        </div>

                        <!-- Amount -->
                        <div class="mb-3">
                            <label for="amount" class="form-label">
                                <i class="fas fa-dollar-sign"></i> Amount ($)
                            </label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount"
                                   value="{{ income.amount }}" min="0.01" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">
                                <i class="fas fa-pencil-alt"></i> Description (Optional)
                            </label>
                            <input type="text" class="form-control" id="description" name="description"
                                   value="{{ income.description or '' }}">
                        </div>

                        <!-- Date -->
                        <div class="mb-3">
                            <label for="date" class="form-label">
                                <i class="fas fa-calendar-alt"></i> Date
                            </label>
                            <input type="date" class="form-control" id="date" name="date"
                                   value="{{ income.date }}">
                        </div>

                        <!-- Recurring Income -->
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_recurring" name="is_recurring"
                                       {% if income.is_recurring %}checked{% endif %}>
                                <label class="form-check-label" for="is_recurring">
                                    <i class="fas fa-sync-alt"></i> Recurring Income
                                </label>
                            </div>
                        </div>

                        <!-- Frequency -->
                        <div class="mb-3" id="frequencyDiv" {% if not income.is_recurring %}style="display: none;"{% endif %}>
                            <label for="frequency" class="form-label">
                                <i class="fas fa-clock"></i> Frequency
                            </label>
                            <select class="form-select" id="frequency" name="frequency">
                                <option value="Weekly" {% if income.frequency == 'Weekly' %}selected{% endif %}>Weekly</option>
                                <option value="Monthly" {% if income.frequency == 'Monthly' %}selected{% endif %}>Monthly</option>
                                <option value="Quarterly" {% if income.frequency == 'Quarterly' %}selected{% endif %}>Quarterly</option>
                                <option value="Yearly" {% if income.frequency == 'Yearly' %}selected{% endif %}>Yearly</option>
                            </select>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('income_manager') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Income
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('is_recurring').addEventListener('change', function() {
    document.getElementById('frequencyDiv').style.display = this.checked ? 'block' : 'none';
});
</script>
{% endblock %}
