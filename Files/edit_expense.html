{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="fas fa-edit text-warning"></i>
                        Edit Expense
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('edit_expense', expense_id=expense.id) }}">
                        <!-- Amount Field -->
                        <div class="mb-3">
                            <label for="amount" class="form-label">
                                <i class="fas fa-dollar-sign"></i> Amount ($)
                            </label>
                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   id="amount"
                                   name="amount"
                                   value="{{ expense.amount }}"
                                   min="0.01"
                                   required>
                        </div>

                        <!-- Category Selection -->
                        <div class="mb-3">
                            <label for="category" class="form-label">
                                <i class="fas fa-tag"></i> Category
                            </label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>🍔 Food</option>
                                <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>🚗 Transport</option>
                                <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>🛍️ Shopping</option>
                                <option value="Bills" {% if expense.category == 'Bills' %}selected{% endif %}>📄 Bills</option>
                                <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>🎬 Entertainment</option>
                                <option value="Healthcare" {% if expense.category == 'Healthcare' %}selected{% endif %}>🏥 Healthcare</option>
                                <option value="Education" {% if expense.category == 'Education' %}selected{% endif %}>📚 Education</option>
                                <option value="Other" {% if expense.category == 'Other' %}selected{% endif %}>📌 Other</option>
                            </select>
                        </div>

                        <!-- Description Field -->
                        <div class="mb-3">
                            <label for="description" class="form-label">
                                <i class="fas fa-pencil-alt"></i> Description
                            </label>
                            <input type="text"
                                   class="form-control"
                                   id="description"
                                   name="description"
                                   value="{{ expense.description }}"
                                   required>
                        </div>

                        <!-- Date Field -->
                        <div class="mb-3">
                            <label for="date" class="form-label">
                                <i class="fas fa-calendar-alt"></i> Date
                            </label>
                            <input type="date"
                                   class="form-control"
                                   id="date"
                                   name="date"
                                   value="{{ expense.date }}">
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="fas fa-save"></i> Update Expense
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
